<svg width="920" height="520" viewBox="0 0 920 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spencer17x terminal profile</title>
  <desc id="desc">Typewriter animated terminal card for Spencer17x GitHub profile.</desc>
  <style>
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .type {
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      animation-name: typeLine;
      animation-duration: var(--dur);
      animation-delay: var(--delay);
      animation-timing-function: steps(var(--steps), end);
      animation-fill-mode: forwards;
    }

    .cursor {
      opacity: 0;
      animation:
        fadeIn 0.12s linear 12.55s forwards,
        blink 0.9s steps(1) 12.7s infinite;
    }

    .scan {
      animation: scan 4.8s linear infinite;
      opacity: 0.22;
    }

    .pulse {
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes typeLine {
      from {
        opacity: 1;
        clip-path: inset(0 100% 0 0);
      }
      to {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes scan {
      from { transform: translateX(-260px); }
      to { transform: translateX(920px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.42; }
      50% { opacity: 1; }
    }
  </style>

  <rect width="920" height="520" rx="18" fill="#0D1117" />
  <rect x="1" y="1" width="918" height="518" rx="17" stroke="#30363D" stroke-width="2" />

  <g class="scan">
    <rect x="0" y="0" width="180" height="520" fill="url(#scanGradient)" />
  </g>

  <rect x="22" y="22" width="876" height="48" rx="12" fill="#161B22" stroke="#30363D" />
  <circle cx="50" cy="46" r="7" fill="#FF5F56" />
  <circle cx="74" cy="46" r="7" fill="#FFBD2E" />
  <circle cx="98" cy="46" r="7" fill="#27C93F" />
  <text x="132" y="52" class="mono" fill="#8B949E" font-size="15">spencer17x@github:~/profile</text>

  <text x="42" y="112" class="mono type" style="--delay:0.25s;--dur:0.72s;--steps:8;" fill="#7EE787" font-size="19">$ whoami</text>
  <text x="42" y="144" class="mono type" style="--delay:1.12s;--dur:0.78s;--steps:10;" fill="#C9D1D9" font-size="19">Spencer17x</text>

  <text x="42" y="190" class="mono type" style="--delay:2.1s;--dur:0.9s;--steps:13;" fill="#7EE787" font-size="19">$ cat ./about</text>
  <text x="42" y="222" class="mono type" style="--delay:3.18s;--dur:0.32s;--steps:4;" fill="#79C0FF" font-size="19">role</text>
  <text x="150" y="222" class="mono type" style="--delay:3.52s;--dur:0.84s;--steps:20;" fill="#C9D1D9" font-size="19">Full-stack Developer</text>
  <text x="42" y="254" class="mono type" style="--delay:4.48s;--dur:0.32s;--steps:4;" fill="#79C0FF" font-size="19">from</text>
  <text x="150" y="254" class="mono type" style="--delay:4.82s;--dur:0.66s;--steps:15;" fill="#C9D1D9" font-size="19">Hangzhou, China</text>
  <text x="42" y="286" class="mono type" style="--delay:5.62s;--dur:0.42s;--steps:5;" fill="#79C0FF" font-size="19">focus</text>
  <text x="150" y="286" class="mono type" style="--delay:6.05s;--dur:1.55s;--steps:48;" fill="#C9D1D9" font-size="19">AI Agents / Frontend / Automation / Dev Tools</text>

  <text x="42" y="332" class="mono type" style="--delay:7.82s;--dur:0.68s;--steps:12;" fill="#7EE787" font-size="19">$ ls ./stack</text>
  <text x="42" y="364" class="mono type" style="--delay:8.64s;--dur:1.46s;--steps:61;" fill="#FFA657" font-size="18">TypeScript  JavaScript  React  Vue  Node.js  Rust  Go  C++</text>

  <text x="42" y="410" class="mono type" style="--delay:10.28s;--dur:0.78s;--steps:13;" fill="#7EE787" font-size="19">$ open ./links</text>
  <text x="42" y="442" class="mono type" style="--delay:11.18s;--dur:0.24s;--steps:4;" fill="#79C0FF" font-size="18">blog</text>
  <text x="150" y="442" class="mono type" style="--delay:11.44s;--dur:0.62s;--steps:28;" fill="#C9D1D9" font-size="18">https://spencer17x.github.io/</text>
  <text x="42" y="474" class="mono type" style="--delay:12.12s;--dur:0.36s;--steps:6;" fill="#79C0FF" font-size="18">github</text>
  <text x="150" y="474" class="mono type" style="--delay:12.5s;--dur:0.82s;--steps:29;" fill="#C9D1D9" font-size="18">https://github.com/Spencer17x</text>
  <rect class="cursor" x="42" y="491" width="10" height="22" rx="2" fill="#7EE787" />

  <circle class="pulse" cx="835" cy="112" r="4" fill="#7EE787" />
  <text x="852" y="118" class="mono pulse" fill="#7EE787" font-size="14">online</text>

  <defs>
    <linearGradient id="scanGradient" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0" />
      <stop offset="0.5" stop-color="#58A6FF" stop-opacity="0.55" />
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
